# Пример использования компонента
external_components:
  - source: github://ВашЛогин/esphome-weact-3.7-epaper-weact-3.7-epaper

display:
  - platform: weact_epaper
    cs_pin: 0
    dc_pin: 5
    busy_pin: 3
    reset_pin: 2
    rotation: 90
    update_interval: 30s
    lambda: |-
      it.print(10, 10, id(font), "Hello from WeAct 3.7\" E-Paper!");